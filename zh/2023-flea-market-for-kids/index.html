    <p><strong>2023年9月16日</strong><br>
    <strong>ESC 俱乐部在 Grace Academy 学校举办了</strong>第一届年度儿童跳蚤市场<strong>活动。该项目是一项以青少年为中心的活动，旨在激发儿童和青少年的创造力、责任感和创业思维。</strong></p>

    <p><strong>我们的使命是提供一个有趣、安全且富有教育意义的空间</strong>。<br>
    <strong>本次活动邀请了多个学生社团，包括 C.A.R.T 机器人团队、Star Youth Foundation、Westview 高中 Project Binary 社团。</strong></p>
